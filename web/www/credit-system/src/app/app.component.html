<div>
  <!-- Nav bar: only when logged in -->
  <nav *ngIf="auth.isLoggedIn">
    <ul>
      <li><a routerLink="/home" routerLinkActive="active" ariaCurrentWhenActive="page">Home</a></li>
    </ul>
  </nav>

  <!-- Landing page: main route, not logged in -->
  <div *ngIf="onMainPage && !auth.isLoggedIn">
    <h1>Welcome</h1>
    <div *ngIf="auth.loginError" style="color: red;">{{ auth.loginError }}</div>
    <button routerLink="/login">Login</button>
    <button routerLink="/signup">Sign Up</button>
  </div>

  <router-outlet></router-outlet>
</div>
